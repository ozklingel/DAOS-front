version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://taskmail:taskmail@db:5432/taskmail
      JWT_SECRET_KEY: dev-secret-change-in-production
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskmail
      POSTGRES_PASSWORD: taskmail
      POSTGRES_DB: taskmail
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmail"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
