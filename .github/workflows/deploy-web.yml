# CI/CD — Flutter Web → GitHub Pages (gh-pages branch)
#
# One-time setup:
# 1. Repo → Settings → Pages → Build and deployment:
#      Source: Deploy from a branch
#      Branch: gh-pages / (root)
# 2. Google Cloud → OAuth client → Authorized JavaScript origins:
#      ONLY: https://ozklingel.github.io
#      (NO path — do NOT add /DAOS-front/)
# 3. Optional Variables (Actions):
#      API_BASE_URL, GOOGLE_SERVER_CLIENT_ID2

name: Deploy Flutter Web

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build web (release)
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          set -e
          REPO_NAME="${{ github.event.repository.name }}"
          API_BASE_URL="${API_BASE_URL:-https://daos-api.onrender.com/api/v1}"
          # Hardcoded Web OAuth client (daos-15254). Do NOT pass empty/secret-masked
          # GitHub vars — empty --dart-define overrides Dart fallback and breaks login.
          CLIENT_ID="812104653331-ur4g34kfo6seil4f6h06igl08ks9ecmt.apps.googleusercontent.com"
          echo "API_BASE_URL=$API_BASE_URL"
          echo "Using Web OAuth client ID (hardcoded for CI)"
          flutter build web --release \
            --base-href "/${REPO_NAME}/" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=GOOGLE_SERVER_CLIENT_ID="$CLIENT_ID"
          cp build/web/index.html build/web/404.html
          # dart2js may split strings — check parts, don't fail the whole deploy
          if grep -q 'ur4g34kfo6seil4f6h06igl08ks9ecmt' build/web/main.dart.js \
             && grep -q '812104653331' build/web/main.dart.js; then
            echo "OK: OAuth client ID fragments present in main.dart.js"
          else
            echo "WARN: could not find client ID fragments (dart2js may obfuscate); continuing"
          fi
          ls -la build/web | head

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./mobile/build/web
          force_orphan: true
