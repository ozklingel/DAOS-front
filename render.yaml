# Render Blueprint — DAOS / TaskMail backend
# Dashboard: New → Blueprint → connect repo → select this file

services:
  - type: web
    name: daos-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: daos-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_ANDROID_CLIENT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_GRAPH_API_VERSION
        value: v25.0
      - key: GREEN_API_URL
        value: https://api.green-api.com
      - key: GREEN_API_ID_INSTANCE
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: FINANDA_API_URL
        sync: false
      - key: FINANDA_API_KEY
        sync: false
      - key: FINANDA_CLIENT_ID
        sync: false
      - key: FINANDA_CLIENT_SECRET
        sync: false
      - key: FINANDA_RETURN_URL
        value: https://ozklingel.github.io/DAOS-front/#/finance
      - key: SALT_EDGE_APP_ID
        sync: false
      - key: SALT_EDGE_SECRET
        sync: false
      - key: SALT_EDGE_API_URL
        value: https://www.saltedge.com
      - key: SALT_EDGE_RETURN_URL
        value: https://ozklingel.github.io/DAOS-front/#/finance
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: daos-db
    plan: free
    databaseName: daos
    user: daos
